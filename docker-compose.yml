services:
  postgres:
    image: postgres:16-alpine
    container_name: pfl-postgres
    environment:
      POSTGRES_USER: pfl
      POSTGRES_PASSWORD: pfl_dev
      POSTGRES_DB: pfl
    # Bind to loopback only — DB must not be reachable from the LAN.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pfl-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfl"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: pfl-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://pfl:pfl_dev@postgres:5432/pfl
      CORS_ORIGINS: http://localhost:3000
      AWS_REGION: ap-south-1
      AWS_S3_ENDPOINT_URL: http://localstack:4566
      AWS_S3_PUBLIC_ENDPOINT_URL: http://localhost:4566
      AWS_SQS_ENDPOINT_URL: http://localstack:4566
      AWS_SES_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      S3_BUCKET: pfl-cases-dev
      SQS_INGESTION_QUEUE: pfl-ingestion-dev
      SQS_INGESTION_DLQ: pfl-ingestion-dev-dlq
      DEV_AUTO_CREATE_AWS_RESOURCES: "true"
    # Dev-only volume mounts so host edits to ./backend/app, ./backend/alembic,
    # ./backend/tests are visible to the running container without a rebuild.
    # Remove (or gate behind compose profile) before shipping.
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    # Bind to loopback only — backend API (holds Anthropic key + session cookies)
    # must not be reachable from the LAN in dev.
    ports:
      - "127.0.0.1:8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  pfl-web:
    build: ./frontend
    container_name: pfl-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
      APP_SECRET: dev-secret-change-me
      COOKIE_SECURE: "false"
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      backend:
        condition: service_started
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  worker:
    build: ./backend
    container_name: pfl-worker
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://pfl:pfl_dev@postgres:5432/pfl
      AWS_REGION: ap-south-1
      AWS_S3_ENDPOINT_URL: http://localstack:4566
      AWS_S3_PUBLIC_ENDPOINT_URL: http://localhost:4566
      AWS_SQS_ENDPOINT_URL: http://localstack:4566
      AWS_SES_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      S3_BUCKET: pfl-cases-dev
      SQS_INGESTION_QUEUE: pfl-ingestion-dev
      SQS_INGESTION_DLQ: pfl-ingestion-dev-dlq
      DEV_AUTO_CREATE_AWS_RESOURCES: "true"
      SES_SENDER: no-reply@pflfinance.com
      SES_VERIFY_ON_STARTUP: "true"
      APP_BASE_URL: http://localhost:8000
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    command: python -m app.worker
    # The Dockerfile defines a healthcheck that hits the FastAPI /health
    # endpoint on :8000 — workers are pure SQS consumers with no HTTP server,
    # so that check is permanently failing (cosmetic "unhealthy" state).
    # Override with a process-liveness check: python is callable.
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3

  pfl-decisioning-worker:
    build: ./backend
    container_name: pfl-decisioning-worker
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://pfl:pfl_dev@postgres:5432/pfl
      AWS_REGION: ap-south-1
      AWS_S3_ENDPOINT_URL: http://localstack:4566
      AWS_S3_PUBLIC_ENDPOINT_URL: http://localhost:4566
      AWS_SQS_ENDPOINT_URL: http://localstack:4566
      AWS_SES_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      S3_BUCKET: pfl-cases-dev
      SQS_INGESTION_QUEUE: pfl-ingestion-dev
      SQS_INGESTION_DLQ: pfl-ingestion-dev-dlq
      SQS_DECISIONING_QUEUE: pfl-decisioning-jobs
      SQS_DECISIONING_DLQ: pfl-decisioning-dlq
      DECISIONING_QUEUE_URL: http://localstack:4566/000000000000/pfl-decisioning-jobs
      DECISIONING_DLQ_URL: http://localstack:4566/000000000000/pfl-decisioning-dlq
      DEV_AUTO_CREATE_AWS_RESOURCES: "true"
      SES_SENDER: no-reply@pflfinance.com
      SES_VERIFY_ON_STARTUP: "true"
      APP_BASE_URL: http://localhost:8000
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    command: python -m app.worker_decisioning
    # Same reasoning as the ingestion worker: no HTTP server, so the inherited
    # /health probe always fails. Replace with a process-liveness check.
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3

  localstack:
    image: localstack/localstack:3
    container_name: pfl-localstack
    environment:
      - SERVICES=s3,sqs,ses
      - AWS_DEFAULT_REGION=ap-south-1
      - PERSISTENCE=1
    # Loopback-only — LocalStack mimics AWS services locally, not for external use.
    ports:
      - "127.0.0.1:4566:4566"
    volumes:
      - pfl-localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pfl-postgres-data:
  pfl-localstack-data:
